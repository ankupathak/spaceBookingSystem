spring:
  profiles:
    active: local
  application:
    name: spaceBookingSystem
  jpa:
    show-sql: true
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
  logging:
    level:
      org.flywaydb: DEBUG

